<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – Taskify</title>
  <meta name="description" content="Get in touch with Taskify – we’d love to hear from you.">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sections.css">
</head>
<body>
<header  >
<nav class="navbar" >
  <div class="navbar__logo">Taskify</div>
  <ul class="navbar__links">
    <li><a href="/pages/index.html">Home</a></li>
    <li><a href="/pages/pricing.html">Pricing</a></li>
    <li><a href="/pages/contact.html">Contact</a></li>
  </ul>
  <div class="navbar__actions">
    <button id="darkToggle" class="btn btn--secondary">🌙</button>
    <a href="/pages/contact.html" class="btn btn--primary">Start Free Trial</a>
  </div>
</nav>
</header>
<main class="main-content">
  <section class="contact fade-in">
     
    <h2 section__title>Contact Us</h2>
   <form >
      <input type="text" name="name" placeholder="Your Name" class="form-control" required>
      <input type="email" name="email" placeholder="Your Email" class="form-control" required>
      <textarea name="message" placeholder="Your Message" class="form-control" rows="5" required></textarea>
      <button type="submit" class="btn btn--primary">Send Message</button>
    </form>
  </section>
  </main>
  <footer class="footer" role="contentinfo">
 
  <ul class="footer__links">
    <li><a href="#">About</a></li>
    <li><a href="#">Privacy</a></li>
    <li><a href="#">Terms</a></li>
  </ul>
  <div class="footer__social">
    <a href="#" aria-label="LinkedIn">LinkedIn</a>
    <a href="#" aria-label="Twitter">Twitter</a>
  </div>
  <p>© 2025 Taskify. All rights reserved.</p>
</footer>

</body>
</html>
